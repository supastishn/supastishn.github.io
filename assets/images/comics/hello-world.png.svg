<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="400" fill="#f8f8f8"/>
  
  <!-- Computer screen -->
  <rect x="200" y="150" width="200" height="150" fill="#333"/>
  <rect x="205" y="155" width="190" height="140" fill="#efefef"/>
  
  <!-- Computer stand -->
  <rect x="275" y="300" width="50" height="20" fill="#333"/>
  <rect x="260" y="320" width="80" height="10" fill="#333"/>
  
  <!-- Person (stick figure) -->
  <circle cx="150" cy="180" r="20" fill="none" stroke="#000" stroke-width="2"/>
  <line x1="150" y1="200" x2="150" y2="270" stroke="#000" stroke-width="2"/>
  <line x1="150" y1="220" x2="120" y2="250" stroke="#000" stroke-width="2"/>
  <line x1="150" y1="220" x2="180" y2="250" stroke="#000" stroke-width="2"/>
  <line x1="150" y1="270" x2="130" y2="330" stroke="#000" stroke-width="2"/>
  <line x1="150" y1="270" x2="170" y2="330" stroke="#000" stroke-width="2"/>
  
  <!-- Speech bubble -->
  <path d="M190,150 Q240,130 290,150 L290,190 Q240,210 190,190 Z" fill="white" stroke="#000" stroke-width="1"/>
  
  <!-- Text -->
  <text x="215" y="177" font-family="monospace" font-size="14" fill="#333">Hello World</text>
  <text x="300" y="65" font-family="Comic Sans MS, cursive" font-size="24" font-weight="bold" fill="#333">Hello World</text>
  <text x="300" y="90" font-family="Arial, sans-serif" font-size="14" fill="#666">My first webcomic</text>
</svg>